<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smartwatch ECG</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #0a1d37;
      --panel: rgba(255, 255, 255, 0.05);
      --panel-strong: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --accent: #16a49e;
      --accent-2: #c98e3f;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: radial-gradient(circle at top left, rgba(22, 164, 158, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(201, 142, 63, 0.14), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .page {
      box-sizing: border-box;
      width: 100%;
      min-height: 100vh;
      height: auto;
      padding: 16px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-bottom: 0;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .content {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      gap: 16px;
      overflow: hidden;
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.04));
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 12px 14px 28px;
      min-height: clamp(320px, 30vh, 460px);
      display: flex;
      flex-direction: column;
    }

    .card {
      position: relative;
      overflow: hidden;
    }

    .card.is-resizing {
      user-select: none;
      cursor: ns-resize;
    }

    .resize-handle {
      flex: 0 0 auto;
      height: 16px;
      margin: 10px -4px -18px;
      border: 0;
      background: transparent;
      cursor: ns-resize;
      touch-action: none;
      position: relative;
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
    }

    .resize-handle::before {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 6px;
      transform: translateX(-50%);
      width: 64px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08);
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .resize-handle:hover::before,
    .card.is-resizing .resize-handle::before {
      background: rgba(255, 255, 255, 0.36);
      transform: translateX(-50%) scaleX(1.05);
    }

    .card-head {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .card-title {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 600;
    }

    .card-meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .card-reset-btn {
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: white;
      border-radius: 10px;
      padding: 0.45rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .card-reset-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.38);
      transform: translateY(-1px);
    }

    .plot {
      flex: 1 1 auto;
      min-height: clamp(200px, 22vh, 320px);
      width: 100%;
    }

    .page--stacked .content {
      grid-template-rows: repeat(3, minmax(0, 1fr));
    }

    .page--clinical {
      overflow: visible;
    }

    .page--clinical .content {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: visible;
    }

    .page--clinical .card {
      min-height: 0;
      height: auto;
      align-self: stretch;
      overflow: visible;
    }

    .page--clinical .plot {
      min-height: 180vh;
      height: 180vh;
      margin-bottom: 14px;
    }

    .page--stacked .card {
      min-height: clamp(320px, 30vh, 460px);
    }

    @media (max-width: 980px) {

      html,
      body {
        overflow-y: auto;
        overflow-x: hidden;
      }

      .page {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .content {
        overflow: visible;
      }

      .page--stacked .content {
        grid-template-rows: auto;
      }

      .page--clinical .content {
        display: flex;
        flex-direction: column;
      }

      .card {
        min-height: clamp(320px, 42vh, 440px);
      }

      .plot {
        min-height: clamp(200px, 28vh, 300px);
      }
    }
  </style>
</head>

<body>

    <div class="header">
      <h1>Smartwatch ECG</h1>
    </div>
    <div class="content">
      <section class="card">
        <div class="card-head">
          <div>
            <h2 class="card-title">Smartwatch ECG - Patient 1</h2>
            <p class="card-meta">ecg_id 351 · 250 Hz</p>
          </div>
          <div class="card-actions">

        </div>
        <div id="smartwatch-1" class="plot"></div>
        <button class="resize-handle" type="button" aria-label="Resize Patient 1 card"></button>
      </section>


      <section class="card">

          <div class="card-actions">
            <button class="card-reset-btn" type="button" onclick="reset_smartwatch_2()">Reset plot</button>
          </div>
        </div>
        <div id="smartwatch-2" class="plot"></div>
        <button class="resize-handle" type="button" aria-label="Resize Patient 2 card"></button>
      </section>


      <section class="card">
        <div class="card-head">
          <div>
            <h2 class="card-title">Smartwatch ECG - Patient 3</h2>
            <p class="card-meta">ecg_id 3821 · 250 Hz</p>

        </div>
        <div id="smartwatch-3" class="plot"></div>
        <button class="resize-handle" type="button" aria-label="Resize Patient 3 card"></button>
      </section>
    </div>
  </div>

        handle.addEventListener('pointermove', (event) => {
          if (!card.classList.contains('is-resizing')) return;
          const nextHeight = Math.max(getMinCardHeight(), startHeight + (event.clientY - startY));
          cards.forEach((currentCard) => {
            currentCard.style.height = `${nextHeight}px`;
          });
          syncAllPlots();
        });

        handle.addEventListener('pointerup', stopResize);
        handle.addEventListener('pointercancel', stopResize);
        handle.addEventListener('lostpointercapture', stopResize);
      });

      window.addEventListener('resize', () => {
        const minHeight = getMinCardHeight();
        cards.forEach((card) => {
          const currentHeight = card.getBoundingClientRect().height;
          if (currentHeight < minHeight) {
            card.style.height = `${minHeight}px`;
          }
        });
        syncAllPlots();
      });
    })();

  </script>
</body>

</html>
