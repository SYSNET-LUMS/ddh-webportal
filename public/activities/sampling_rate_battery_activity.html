<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slide 14 Activity: Sampling Rate vs Battery Life</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #0a1d37;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.15);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.75);
      --accent: #16a49e;
      --accent-2: #c98e3f;
      --shadow: 0 14px 36px rgba(0, 0, 0, 0.30);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(circle at 10% 8%, rgba(22, 164, 158, 0.18), transparent 30%),
        radial-gradient(circle at 90% 92%, rgba(201, 142, 63, 0.16), transparent 34%),
        var(--bg);
    }

    .page {
      box-sizing: border-box;
      width: 100%;
      min-height: 100vh;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 600;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 960px;
      line-height: 1.4;
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.04));
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 14px 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .controls {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .label {
      min-width: 210px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    input[type="range"] {
      flex: 1 1 360px;
      accent-color: var(--accent);
      min-width: 220px;
    }

    .value-chip {
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 0.65rem;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.45rem 0.7rem;
      font-size: 0.84rem;
      color: #fff;
    }

    .plot-wrap {
      width: 100%;
      min-height: 66vh;
      height: 66vh;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.02);
    }

    .reset-btn {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 10px;
      padding: 0.45rem 0.75rem;
      font-size: 0.83rem;
      cursor: pointer;
    }

    .reset-btn:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    @media (max-width: 800px) {
      .plot-wrap {
        min-height: 62vh;
        height: 62vh;
      }

      .label {
        min-width: 180px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="header">
      <h1>Sampling Rate vs Battery Life</h1>
      <p class="subtitle">Use the slider to find the lowest sampling rate where ECG morphology is still clearly visible.
        Higher sampling rate preserves detail but costs battery.</p>
    </div>

    <section class="card">
      <div class="controls">

        <div class="row">
          <span class="label">Sampling Rate</span>

        </div>
        <div class="row">
          <button id="resetZoomBtn" class="reset-btn" type="button">Reset Zoom</button>

        <div class="stats">
          <div class="stat">Estimated Battery Life: <strong id="batteryValue">24.0 h</strong></div>
          <div class="stat">Relative Energy Use: <strong id="energyValue">25.0%</strong></div>
          <div class="stat">Sample Rate: <strong id="sampleCount">1250</strong></div>
        </div>

      </div>
      <div id="samplingPlot" class="plot-wrap"></div>
    </section>
  </div>

      fsValue.textContent = `${f} Hz`;
      batteryValue.textContent = `${batt.toFixed(1)} h`;
      energyValue.textContent = `${energy.toFixed(1)}%`;
      sampleCount.textContent = String(Math.floor((10 * f) / 10));
    }

    fsSlider.addEventListener('input', renderSampling);
    resetZoomBtn.addEventListener('click', () => {
      Plotly.relayout('samplingPlot', { 'xaxis.autorange': true, 'yaxis.autorange': true });
    });

    renderSampling();

  </script>
</body>

</html>
