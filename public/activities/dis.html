<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Activity</title>
  <style>
    .class-activity-container {
      min-height: 100vh;
      width: 100%;
      background-color: #0a1d37;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      overflow-x: hidden;
      color: white;
    }

    .ca-body {
      flex: 1;
      padding: 3rem 2.5rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .ca-text-card {
      max-width: 900px;
      width: 100%;
      padding: 2.5rem 3rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .ca-text-main {
      font-size: 2.4rem;
      line-height: 1.3;
      font-weight: 500;
      margin: 0 0 2.5rem 0;
      letter-spacing: 0.01em;
    }

    .ca-text-heading {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 1rem 0;
    }

    .ca-text-list {
      margin: 0;
      padding-left: 1.5rem;
      font-size: 1.5rem;
      line-height: 1.8;
    }

    .ca-text-list li {
      margin-bottom: 0.4rem;
    }
  </style>
</head>
<body>
  <div class="class-activity-container">
    <div class="ca-body">
      <div class="ca-text-card">
        <p class="ca-text-main">
          Pick one condition you manage where remote<br />
          monitoring is tempting.
        </p>

        <h2 class="ca-text-heading">Define:</h2>

        <ul class="ca-text-list">
          <li>What measurement would change management?</li>
          <li>What error would be dangerous?</li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
